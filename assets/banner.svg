<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif" role="img" aria-label="НЕЧТО — ПРОТОКОЛ ЗАРАЖЕНИЯ">
  <defs>

    <radialGradient id="bg" cx="62%" cy="46%" r="75%">
      <stop offset="0%" stop-color="#141811"></stop>
      <stop offset="55%" stop-color="#0a0d0a"></stop>
      <stop offset="100%" stop-color="#050706"></stop>
    </radialGradient>

    <radialGradient id="hal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7a8"></stop>
      <stop offset="16%" stop-color="#ffd400"></stop>
      <stop offset="40%" stop-color="#ff3a18"></stop>
      <stop offset="74%" stop-color="#7a0a05"></stop>
      <stop offset="100%" stop-color="#1a0303"></stop>
    </radialGradient>
    <radialGradient id="halGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2412" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#ff2412" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="vig" cx="50%" cy="42%" r="72%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"></stop>
    </radialGradient>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"></rect>
      <rect width="4" height="1" y="0" fill="#ffffff" opacity="0.04"></rect>
    </pattern>

    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 H0 V60" fill="none" stroke="#2a3320" stroke-width="0.6" opacity="0.5"></path>
    </pattern>
    <linearGradient id="sweep" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#c3d63a" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#c3d63a" stop-opacity="0.16"></stop>
      <stop offset="100%" stop-color="#c3d63a" stop-opacity="0"></stop>
    </linearGradient>
  </defs>


  <rect width="1200" height="380" fill="url(#bg)"></rect>
  <rect width="1200" height="380" fill="url(#grid)"></rect>


  <g>
    <!-- HAL glow pulse: t=0→4s of 30s cycle, затем пауза 26s -->
    <circle cx="985" cy="178" r="150" fill="url(#halGlow)">
      <animate attributeName="r"
        values="150; 185; 150; 150"
        keyTimes="0; 0.067; 0.133; 1"
        dur="30s" repeatCount="indefinite" calcMode="linear"/>
      <animate attributeName="opacity"
        values="1; 0.7; 1; 1"
        keyTimes="0; 0.067; 0.133; 1"
        dur="30s" repeatCount="indefinite" calcMode="linear"/>
    </circle>
    <circle cx="985" cy="178" r="108" fill="#0a0608" stroke="#1c1010" stroke-width="2"></circle>
    <circle cx="985" cy="178" r="96" fill="#000" stroke="#5a1c14" stroke-width="1"></circle>
    <circle cx="985" cy="178" r="82" fill="url(#hal)"></circle>

    <g fill="none" stroke="#3a0a05" stroke-width="2.4" opacity="0.8" stroke-linecap="round">
      <path d="M965 138 q7 20 -3 42 q-11 22 6 42"></path>
      <path d="M1007 140 q-8 24 6 42 q11 16 -6 38"></path>
      <path d="M985 124 q12 30 0 54 q-11 18 6 44"></path>
    </g>

    <circle cx="985" cy="178" r="19" fill="#1a0000"></circle>
    <circle cx="978" cy="171" r="6" fill="#fff5cc" opacity="0.9"></circle>

    <g fill="#3a1a14">
      <circle cx="918" cy="118" r="2.6"></circle><circle cx="1052" cy="118" r="2.6"></circle>
      <circle cx="918" cy="238" r="2.6"></circle><circle cx="1052" cy="238" r="2.6"></circle>
    </g>
    <text x="985" y="300" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="5" fill="#7a1208">PRESENCE DETECTED</text>
  </g>


  <g>

    <text x="74" y="92" font-family="monospace" font-size="15" letter-spacing="7" fill="#c3d63a" opacity="0.92">// LOCAL CO-OP HORROR · v.dev</text>


    <g>
      <text x="70" y="222" font-size="138" font-weight="900" letter-spacing="6" fill="#efe6ce">НЕЧТО</text>

      <!-- Глитч слой НЕЧТО: t=22→22.7s of 30s cycle -->
      <text x="70" y="222" font-size="138" font-weight="900" letter-spacing="6" fill="none" stroke="#ff2412" stroke-width="0.6" opacity="0">НЕЧТО
        <animate attributeName="opacity"
          values="0; 0; 0.85; 0; 0.5; 0; 0"
          keyTimes="0; 0.733; 0.740; 0.750; 0.757; 0.767; 1"
          dur="30s" repeatCount="indefinite" calcMode="linear"/>
      </text>
    </g>


    <text x="74" y="272" font-size="29" font-weight="700" letter-spacing="9" fill="#9aab30">
      <tspan fill="#ff6b1a">— </tspan>ПРОТОКОЛ ЗАРАЖЕНИЯ
    </text>


    <g font-family="monospace" font-size="14" letter-spacing="3" fill="#6a6a5e">
      <!-- REC мигает постоянно, период 1.6s -->
      <circle cx="80" cy="326" r="5" fill="#ff2412">
        <animate attributeName="opacity"
          values="1; 1; 0.1; 0.1; 1"
          keyTimes="0; 0.38; 0.50; 0.62; 1"
          dur="1.6s" repeatCount="indefinite" calcMode="linear"/>
      </circle>
      <text x="94" y="331" fill="#ff2412">REC</text>
      <text x="146" y="331">BIOSIGNATURES 8 +?</text>
      <text x="420" y="331" fill="#3f4a34">·</text>
      <text x="446" y="331">NOSTROMO 180924609</text>
    </g>
  </g>


  <!-- Сканлайн: t=10→13s of 30s cycle, мгновенный возврат -->
  <rect x="0" y="-70" width="1200" height="70" fill="url(#sweep)">
    <animate attributeName="y"
      values="-70; -70; 380; -70; -70"
      keyTimes="0; 0.333; 0.433; 0.434; 1"
      dur="30s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
  <rect x="0" y="0" width="1200" height="2" fill="#dfe6a8" opacity="0.5"></rect>


  <rect width="1200" height="380" fill="url(#scan)"></rect>
  <rect width="1200" height="380" fill="url(#vig)"></rect>


  <g stroke="#c3d63a" stroke-width="2" fill="none" opacity="0.7">
    <path d="M24 52 V24 H52"></path>
    <path d="M1148 24 H1176 V52"></path>
    <path d="M24 328 V356 H52"></path>
    <path d="M1148 356 H1176 V328"></path>
  </g>
  <rect x="14" y="14" width="1172" height="352" fill="none" stroke="#1f261a" stroke-width="1"></rect>
</svg>
